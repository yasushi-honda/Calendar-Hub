name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-northeast1
  REPO_NAME: calendar-hub

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo build
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: pnpm turbo type-check
      - name: Test
        run: pnpm test

  deploy-api:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Web URL for CORS
        id: weburl
        run: |
          # 既存Webサービス未存在（初回ブートストラップ）のみ空を許容。
          # 他の失敗（権限/API無効/ネットワーク）は localhost にフォールバックせず失敗させる
          set +e
          WEB_URL=$(gcloud run services describe calendar-hub-web \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format="value(status.url)" 2>describe_err.log)
          DESCRIBE_EXIT=$?
          set -e
          if [ "$DESCRIBE_EXIT" -ne 0 ]; then
            if grep -q "NOT_FOUND\|Cannot find service" describe_err.log; then
              echo "::warning::calendar-hub-web not yet deployed; FRONTEND_URL will be empty on first bootstrap"
              WEB_URL=""
            else
              echo "::error::failed to describe calendar-hub-web"
              cat describe_err.log
              exit 1
            fi
          fi
          if [ -z "$WEB_URL" ] && [ "${ALLOW_BOOTSTRAP:-false}" != "true" ]; then
            echo "::error::Web URL empty and ALLOW_BOOTSTRAP!=true; refusing to deploy API with placeholder CORS"
            exit 1
          fi
          echo "url=${WEB_URL}" >> "$GITHUB_OUTPUT"

      - name: Cloud Build submit (API image)
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPO_NAME}/calendar-hub-api:${COMMIT_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          gcloud builds submit \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --config=infra/cloudbuild-api.yaml \
            --substitutions="_IMAGE=${IMAGE}" \
            .

      - name: Deploy API to Cloud Run
        id: deploy
        env:
          WEB_URL: ${{ steps.weburl.outputs.url }}
        run: |
          gcloud run deploy calendar-hub-api \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="GCP_PROJECT_ID=${GCP_PROJECT_ID},FRONTEND_URL=${WEB_URL}" \
            --set-secrets="GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,TOKEN_ENCRYPTION_KEY=token-encryption-key:latest,SYNC_SCHEDULER_TOKEN=sync-scheduler-token:latest"
          URL=$(gcloud run services describe calendar-hub-api \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format="value(status.url)")
          if [ -z "$URL" ]; then
            echo "::error::API URL empty after deploy; aborting"
            exit 1
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      API_URL: ${{ needs.deploy-api.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify API URL is set
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::API_URL is empty; deploy-api output missing"
            exit 1
          fi
          echo "Using API_URL=$API_URL"

      - name: Cloud Build submit (Web image)
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPO_NAME}/calendar-hub-web:${COMMIT_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          gcloud builds submit \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --config=infra/cloudbuild-web.yaml \
            --substitutions="_IMAGE=${IMAGE},_API_URL=${API_URL}" \
            .

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy calendar-hub-web \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="NEXT_PUBLIC_API_URL=${API_URL},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${GCP_PROJECT_ID}"
