displayName: '[Calendar Hub] API 4xx spike'
documentation:
  content: |
    Cloud Run の API サービス (`calendar-hub-api`) で 4xx が 5 分間で 20 件以上発生。
    単発のクライアント入力ミス (400) や認証切れ (401) ではなく、連続発生する
    異常パターン（攻撃 / クライアント側のバグ / OAuth 一括失効）を検知する。

    対応:
    - 401/403 集中 → OAuth トークン失効 or Firebase Auth 設定変更
    - 404 集中 → Next.js ルーティングの破損、古いクライアントキャッシュ
    - 400 集中 → request body スキーマ変更の後方互換性欠如

    spec 原文の "前日同時刻比 +300%" は MQL の 1d shift を要するが、
    単独開発の低トラフィック環境では時系列ベースラインが不安定（idle window が
    多い）。絶対件数で連続異常を捕捉する方が false-positive/negative 共に健全。
    4xx 全量 20 件閾値だと 400 (client input error) のノイズと 401/403
    (OAuth 一括失効 / session 破綻) の致命レベルが同じ閾値に埋もれるため、
    認証系 (401/403) は別条件で 5 件 /5min と低く設定する。
  mimeType: text/markdown
combiner: OR
conditions:
  - displayName: '4xx_count (all) >= 20 in 5min'
    conditionThreshold:
      filter: >-
        metric.type="run.googleapis.com/request_count"
        AND resource.type="cloud_run_revision"
        AND resource.labels.service_name="calendar-hub-api"
        AND metric.labels.response_code_class="4xx"
      comparison: COMPARISON_GT
      thresholdValue: 19
      duration: 0s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
          groupByFields:
            - resource.label.service_name
  - displayName: 'auth_4xx (401+403) >= 5 in 5min'
    conditionThreshold:
      filter: >-
        metric.type="run.googleapis.com/request_count"
        AND resource.type="cloud_run_revision"
        AND resource.labels.service_name="calendar-hub-api"
        AND (metric.labels.response_code="401" OR metric.labels.response_code="403")
      comparison: COMPARISON_GT
      thresholdValue: 4
      duration: 0s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
          groupByFields:
            - resource.label.service_name
alertStrategy:
  autoClose: 86400s
enabled: true
