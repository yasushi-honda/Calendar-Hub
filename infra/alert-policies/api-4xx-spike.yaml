displayName: '[Calendar Hub] API 4xx spike'
documentation:
  content: |
    Cloud Run の API サービス (`calendar-hub-api`) で 4xx が連続発生。2 条件 OR 結合:
    - 全 4xx (401/403 含む) が 5min で ≥ 20 件 (攻撃 / 400 入力不整合の連続化等)
    - 401/403 のみ 5min で ≥ 5 件 (OAuth 一括失効 / session 破綻を早期検知)

    対応:
    - 401/403 集中 → OAuth トークン失効 or Firebase Auth 設定変更
    - 404 集中 → Next.js ルーティングの破損、古いクライアントキャッシュ
    - 400 集中 → request body スキーマ変更の後方互換性欠如

    閾値の deviation 根拠は ADR-006 §deviation 参照。
  mimeType: text/markdown
combiner: OR
conditions:
  - displayName: '4xx_count (all) >= 20 in 5min'
    conditionThreshold:
      filter: >-
        metric.type="run.googleapis.com/request_count"
        AND resource.type="cloud_run_revision"
        AND resource.labels.service_name="calendar-hub-api"
        AND metric.labels.response_code_class="4xx"
      comparison: COMPARISON_GT
      thresholdValue: 19
      duration: 0s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
  - displayName: 'auth_4xx (401+403) >= 5 in 5min'
    conditionThreshold:
      filter: >-
        metric.type="run.googleapis.com/request_count"
        AND resource.type="cloud_run_revision"
        AND resource.labels.service_name="calendar-hub-api"
        AND (metric.labels.response_code="401" OR metric.labels.response_code="403")
      comparison: COMPARISON_GT
      thresholdValue: 4
      duration: 0s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
alertStrategy:
  autoClose: 86400s
enabled: true
